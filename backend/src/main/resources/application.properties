spring.application.name=kopikade

# Database Connection
spring.datasource.url=jdbc:mysql://localhost:3306/kopikade?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configurations
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Configurations (64 hex characters for security)
kopikade.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
kopikade.jwt.expiration=86400000

# File Upload Configurations
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Server Port
server.port=8080
